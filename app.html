<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#08110f">
  <title>Eigenbytes</title>
  <style>
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#08110f}
    iframe{display:block;width:100%;height:100%;border:0;background:#08110f}
    .back-home{position:fixed;z-index:10;top:18px;left:18px;display:inline-flex;align-items:center;gap:8px;padding:11px 16px;border:1px solid rgba(255,255,255,.18);border-radius:999px;background:rgba(8,17,15,.88);color:#f4f7f5;text-decoration:none;font:700 13px/1 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;box-shadow:0 10px 30px rgba(0,0,0,.28);backdrop-filter:blur(12px);transition:.2s ease}
    .back-home:hover{transform:translateY(-1px);border-color:#31d59b;color:#31d59b}
    @media(max-width:600px){.back-home{top:10px;left:10px;padding:10px 13px;font-size:12px}}
  </style>
</head>
<body>
  <iframe
    title="Eigenbytes website"
    src="https://ai-insight-hub-forked.replit.app"
    allow="clipboard-read; clipboard-write; fullscreen"
    referrerpolicy="strict-origin-when-cross-origin">
  </iframe>
</body>
</html>
